name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          # pnpm 11.5+ requires Node ≥ 22.13.
          node-version: 22
          cache: pnpm
      # pnpm 11 blocks native build scripts by default; we need better-sqlite3
      # to compile its addon so the tests can `new Database(...)`.
      - run: pnpm install --frozen-lockfile --config.dangerouslyAllowAllBuilds=true
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
