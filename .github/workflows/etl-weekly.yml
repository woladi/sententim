name: etl-weekly

on:
  schedule:
    # Every Monday 03:30 UTC = 04:30 / 05:30 Warsaw — well off-peak for CELLAR.
    - cron: "30 3 * * 1"
  workflow_dispatch:
    inputs:
      skip_sn:
        description: "Skip Sąd Najwyższy step"
        type: boolean
        default: false
      skip_cjeu:
        description: "Skip CJEU step"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: etl-weekly
  cancel-in-progress: false

jobs:
  etl:
    name: Weekly incremental ETL
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SENTENTIM_SUMMARY_MODEL: claude-haiku-4-5-20251001
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run incremental ETL
        run: pnpm etl:incremental
        env:
          SENTENTIM_SKIP_SN: ${{ inputs.skip_sn }}
          SENTENTIM_SKIP_CJEU: ${{ inputs.skip_cjeu }}

      - name: Verify produced DB
        run: pnpm etl:verify

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet --exit-code -- data/rulings.db data/manifest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with refreshed DB
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: data/weekly-${{ github.run_number }}
          commit-message: |
            data: weekly incremental refresh

            Automated by .github/workflows/etl-weekly.yml
            Built at ${{ github.run_id }}.
          title: "data: weekly incremental refresh"
          body: |
            Automated weekly refresh of the bundled `data/rulings.db`.

            **Manifest delta**
            ```diff
            $(git diff -- data/manifest.json | tail -n +5)
            ```

            Triggered by: `etl-weekly` workflow run #${{ github.run_number }}.
          labels: |
            data
            automated
          delete-branch: true
