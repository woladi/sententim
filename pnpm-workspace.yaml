allowBuilds:
  '@biomejs/biome': set this to true or false
  better-sqlite3: set this to true or false
  esbuild: set this to true or false
# Single-package workspace.  Hosts pnpm 11+ `onlyBuiltDependencies` so
# better-sqlite3 can compile its native binding.
onlyBuiltDependencies:
  - better-sqlite3
  - "@biomejs/biome"
  - esbuild
